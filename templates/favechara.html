<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#ffffff">
        <link rel="shortcut icon" type="image/x-icon" href="static/logo.png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="/static/css/defStyle.css">
        <link rel="stylesheet" type="text/css" href="/static/css/charas.css">
        <link rel="stylesheet" href="/static/css/headers.css">
        <style>
            html { visibility: hidden; }
            .nav-pills .nav-link.active {
                background-color: rgb(162, 0, 255) !important;
            }

          
            .chara-grid a {
                display: block;
                width: 250px;  
                height: 250px; 
                overflow: hidden;
                border-radius: 8px; 
            }
           
            .chara-grid img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                object-position: center; 
                transition: transform 0.3s ease; 
            }

            .chara-grid a:hover img {
                transform: scale(1.05);
            }
        </style>
        <title>Favorite Character</title>
    </head>
    <body style="background-color:rgb(0, 0, 0);">
    
        <meta name="theme-color" content="#ffffff" />

        <header class="d-flex py-3 justify-content-center">
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="https://www.kimcodes.lol/home" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="https://www.kimcodes.lol/projects" class="nav-link">Projects</a></li>
                <li class="nav-item"><a href="https://www.kimcodes.lol/art" class="nav-link">Art</a></li>
                <li class="nav-item"><a href="https://www.kimcodes.lol/favechara" class="nav-link active">Characters</a></li>
                <li class="nav-item"><a href="https://www.kimcodes.lol/kittyclicker" class="nav-link">Clicker Game</a></li>
            </ul>
        </header>

        <main class="container text-center my-4" style="max-width: 1200px;">
            
            <p style="color: white; padding-bottom: 20px;">[Song: Lazy Afternoons - Kingdom Hearts 2]</p>

            <h1 style="color: rgb(162, 0, 255);">My Favorite Characters</h1>
            <p style="color: #b3b3b3;" class="mb-4">Clicking their image takes you to their wikipage.</p>

            <div class="chara-grid d-flex flex-wrap justify-content-center gap-3">
                <a href="https://doraemon.fandom.com/wiki/Doraemon" target="_blank" rel="noopener noreferrer"><img src="/static/doraemon.jpg" alt="Doraemon"></a>
                <a href="https://poppy-playtime.fandom.com/wiki/CatNap" target="_blank" rel="noopener noreferrer"><img src="/static/catnap.jpg" alt="CatNap"></a>
                <a href="https://valorant.fandom.com/wiki/Cypher" target="_blank" rel="noopener noreferrer"><img src="/static/cypher.jpg" alt="Cypher"></a>
                <a href="https://samandmax.fandom.com/wiki/Max" target="_blank" rel="noopener noreferrer"><img src="/static/max.jpg" alt="Max"></a>
            </div>

        </main>

        <audio autoplay loop id="myaudio">
            <source src="/static/aboutme.mp3" type="audio/mpeg">
        </audio>
        <script>
            var audio = document.getElementById("myaudio");
            audio.volume = 0.1;
        </script>
        
        <canvas id="snow-canvas"></canvas>
        <script src="static/snow.js"></script>
        <script>document.documentElement.style.visibility = 'visible';</script>
    </body>
</html>
