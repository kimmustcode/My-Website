<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#ffffff">
        <link rel="shortcut icon" type="image/x-icon" href="static/logo.png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="/static/css/defStyle.css">
        <link rel="stylesheet" type="text/css" href="/static/css/charas.css">
        <link rel="stylesheet" href="/static/css/headers.css">
        <style>
            html { visibility: hidden; }
            .nav-pills .nav-link.active {
                background-color: rgb(162, 0, 255) !important;
            }

            .chara-grid a {
                display: block;
                width: 250px;  
                height: 250px; 
                overflow: hidden; 
                border-radius: 8px;
            }

            
            .chara-grid img {
                width: 100%;
                height: 100%;
                object-fit: cover; 
                object-position: center; 
                transition: transform 0.3s ease; 
            }

           
            .chara-grid a:hover img {
                transform: scale(1.05);
            }
        </style>
        <title>Art</title>
    </head>
    <body style="background-color:rgb(0, 0, 0);">
    
        <header class="d-flex py-3 justify-content-center">
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="https://www.kimcodes.lol/home" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="https://www.kimcodes.lol/projects" class="nav-link">Projects</a></li>
                <li class="nav-item"><a href="https://www.kimcodes.lol/art" class="nav-link active">Art</a></li>
                <li class="nav-item"><a href="https://www.kimcodes.lol/favechara" class="nav-link">Characters</a></li>
                <li class="nav-item"><a href="https://www.kimcodes.lol/kittyclicker" class="nav-link">Clicker Game</a></li>
            </ul>
        </header>

        <main class="container text-center my-4" style="max-width: 1200px;">
            
            <p style="color: white; padding-bottom: 20px;">[Song: Wolf and Rabbit - Beastars]</p>

            <h1 style="color: rgb(162, 0, 255);">Art of My Character</h1>
            <p style="color: #b3b3b3;" class="mb-4">Clickable images are links to the artist</p>
            
            <div class="chara-grid d-flex flex-wrap justify-content-center gap-3">
                <a href="https://twitter.com/Mochacciino" target="_blank" rel="noopener noreferrer"><img src="/static/dakota1.jpg" alt="Dakota Art 1"></a>
                <a><img src="/static/dakota2.jpg" alt="Dakota Art 2"></a>
                <a><img src="/static/dakota3.jpg" alt="Dakota Art 3"></a>
                <a href="https://twitter.com/RedWesternWolf" target="_blank" rel="noopener noreferrer"><img src="/static/dakota6.jpg" alt="Dakota Art 4"></a>
                <a href="https://twitter.com/RedWesternWolf" target="_blank" rel="noopener noreferrer"><img src="/static/dakota4.png" alt="Dakota Art 5"></a>
            </div>

        </main>

        <audio autoplay loop id="myaudio">
            <source src="/static/art.mp3" type="audio/mpeg">
        </audio>
        <script>
            var audio = document.getElementById("myaudio");
            audio.volume = 0.1;
        </script>
        
        <canvas id="snow-canvas"></canvas>
        <script src="static/snow.js"></script>
        <script>document.documentElement.style.visibility = 'visible';</script>
    </body>
</html>
